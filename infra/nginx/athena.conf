# Athena Nginx — Production

# Append to your existing nginx server block:
#
# location /athena/ {
#     include /path/to/athena/infra/nginx/athena.conf;
# }

upstream athena_frontend {
    server frontend:3000;
}

upstream athena_backend {
    server backend:8000;
}

# API
location /athena/api/ {
    rewrite ^/athena/api/(.*) /api/v1/$1 break;
    proxy_pass http://athena_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # Rate limiting
    limit_req zone=athena_api burst=20 nodelay;
}

# Swagger Docs
location /athena/docs {
    proxy_pass http://athena_backend/docs;
    proxy_set_header Host $host;
}

# Health Check
location /athena/health {
    proxy_pass http://athena_backend/health;
    proxy_set_header Host $host;
}

# Frontend
location /athena/ {
    proxy_pass http://athena_frontend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
